<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#1a1a2e"/>
  <!-- Tatami mat pattern -->
  <rect x="100" y="200" width="600" height="250" rx="8" fill="#2d5016" opacity="0.6"/>
  <line x1="100" y1="325" x2="700" y2="325" stroke="#3a6b1e" stroke-width="1" opacity="0.4"/>
  <line x1="300" y1="200" x2="300" y2="450" stroke="#3a6b1e" stroke-width="1" opacity="0.4"/>
  <line x1="500" y1="200" x2="500" y2="450" stroke="#3a6b1e" stroke-width="1" opacity="0.4"/>
  <!-- Judoka 1 (white gi) -->
  <circle cx="340" cy="280" r="22" fill="#e8e0d0"/>
  <rect x="318" y="302" width="44" height="60" rx="6" fill="#f5f0e8"/>
  <line x1="330" y1="302" x2="330" y2="340" stroke="#1a1a2e" stroke-width="2"/>
  <rect x="325" y="325" width="30" height="4" rx="2" fill="#1a1a2e"/>
  <line x1="318" y1="315" x2="295" y2="300" stroke="#f5f0e8" stroke-width="8" stroke-linecap="round"/>
  <line x1="362" y1="315" x2="385" y2="290" stroke="#f5f0e8" stroke-width="8" stroke-linecap="round"/>
  <line x1="330" y1="362" x2="320" y2="410" stroke="#f5f0e8" stroke-width="8" stroke-linecap="round"/>
  <line x1="350" y1="362" x2="360" y2="410" stroke="#f5f0e8" stroke-width="8" stroke-linecap="round"/>
  <!-- Judoka 2 (blue gi) -->
  <circle cx="460" cy="285" r="22" fill="#e8e0d0"/>
  <rect x="438" y="307" width="44" height="60" rx="6" fill="#1e3a5f"/>
  <line x1="450" y1="307" x2="450" y2="345" stroke="#0f1f33" stroke-width="2"/>
  <rect x="445" y="330" width="30" height="4" rx="2" fill="#d4a017"/>
  <line x1="438" y1="320" x2="400" y2="295" stroke="#1e3a5f" stroke-width="8" stroke-linecap="round"/>
  <line x1="482" y1="320" x2="505" y2="340" stroke="#1e3a5f" stroke-width="8" stroke-linecap="round"/>
  <line x1="450" y1="367" x2="440" y2="415" stroke="#1e3a5f" stroke-width="8" stroke-linecap="round"/>
  <line x1="470" y1="367" x2="480" y2="415" stroke="#1e3a5f" stroke-width="8" stroke-linecap="round"/>
  <!-- Text -->
  <text x="400" y="120" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#e0e0e0">Training im Sport Dojo</text>
  <text x="400" y="155" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#a0a0a0">Judo für alle Altersgruppen</text>
</svg>