    <rect x="-14" y="316" width="28" height="40" rx="4" fill="#f5f0e8"/>
    <rect x="-8" y="332" width="16" height="3" rx="1" fill="#f5a623"/>
    <line x1="0" y1="356" x2="-6" y2="390" stroke="#f5f0e8" stroke-width="6" stroke-linecap="round"/>
    <line x1="0" y1="356" x2="6" y2="390" stroke="#f5f0e8" stroke-width="6" stroke-linecap="round"/>
