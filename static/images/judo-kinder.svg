<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#1a1a2e"/>
  <!-- Tatami -->
  <rect x="50" y="220" width="700" height="230" rx="8" fill="#2d5016" opacity="0.6"/>
  <!-- Small judoka group (kids in white gi, different heights) -->
  <g transform="translate(150, 0)">
    <circle cx="0" cy="300" r="16" fill="#f0d9b5"/>
    <rect x="-14" y="316" width="28" height="40" rx="4" fill="#f5f0e8"/>
    <rect x="-8" y="332" width="16" height="3" rx="1" fill="#f5a623"/>
    <line x1="0" y1="356" x2="-6" y2="390" stroke="#f5f0e8" stroke-width="6" stroke-linecap="round"/>
    <line x1="0" y1="356" x2="6" y2="390" stroke="#f5f0e8" stroke-width="6" stroke-linecap="round"/>
  </g>
  <g transform="translate(250, -15)">
