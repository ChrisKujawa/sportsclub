    <line x1="0" y1="353" x2="5" y2="385" stroke="#f5f0e8" stroke-width="5" stroke-linecap="round"/>
  </g>
  <g transform="translate(450, -10)">
    <circle cx="0" cy="300" r="17" fill="#e0c090"/>
    <rect x="-15" y="317" width="30" height="44" rx="4" fill="#f5f0e8"/>
    <rect x="-8" y="334" width="16" height="3" rx="1" fill="#2d8f2d"/>
    <line x1="0" y1="361" x2="-6" y2="398" stroke="#f5f0e8" stroke-width="6" stroke-linecap="round"/>
