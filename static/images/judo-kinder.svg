  <text x="400" y="100" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#e0e0e0">Kindertraining</text>
  <text x="400" y="135" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#a0a0a0">Minis, Kinder &amp; Jugend</text>
