{{ define "main" }}
<header class="mt-5 mb-10">
  <h1 class="text-4xl font-extrabold">{{ .Title }}</h1>
  {{ with .Description }}
  <p class="mt-2 text-lg text-neutral-500 dark:text-neutral-400">{{ . }}</p>
  {{ end }}
</header>

{{ range .Pages.ByDate.Reverse }}
<article class="mb-14 pb-10 border-b border-neutral-700">
  <header class="mb-4">
    <h2 class="text-2xl font-bold">
      <a href="{{ .RelPermalink }}" class="hover:text-primary-500">{{ .Title }}</a>
    </h2>
    <time class="text-sm text-neutral-400" datetime="{{ .Date.Format "2006-01-02" }}">
      {{ .Date.Format "02.01.2006" }}
    </time>
  </header>
  <div class="prose dark:prose-invert max-w-none">
    {{ .Content }}
  </div>
</article>
{{ end }}

{{ end }}
