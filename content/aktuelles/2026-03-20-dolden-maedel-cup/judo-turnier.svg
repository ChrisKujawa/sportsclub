<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#1a1a2e"/>
  <!-- Competition mat -->
  <rect x="100" y="180" width="600" height="280" rx="8" fill="#1e3a5f" opacity="0.5"/>
  <rect x="150" y="210" width="500" height="220" rx="4" fill="#2d5016" opacity="0.6"/>
  <!-- Contest area border -->
  <rect x="200" y="240" width="400" height="160" rx="2" fill="none" stroke="#cc3333" stroke-width="3" opacity="0.6"/>
  <!-- Judoka throwing (ippon seoi nage) -->
  <g transform="translate(370, 20)">
    <!-- Tori (thrower, white) -->
    <circle cx="0" cy="290" r="20" fill="#e8c9a0"/>
    <rect x="-16" y="310" width="32" height="50" rx="5" fill="#f5f0e8" transform="rotate(-15, 0, 335)"/>
    <rect x="-9" y="330" width="18" height="3" rx="1" fill="#1a1a2e" transform="rotate(-15, 0, 335)"/>
    <!-- Uke (thrown, blue) flying -->
    <circle cx="60" cy="270" r="20" fill="#f0d9b5"/>
    <rect x="44" y="290" width="32" height="50" rx="5" fill="#1e3a5f" transform="rotate(45, 60, 315)"/>
    <rect x="51" y="310" width="18" height="3" rx="1" fill="#d4a017" transform="rotate(45, 60, 315)"/>
  </g>
  <!-- Scoreboard -->
  <rect x="300" y="30" width="200" height="60" rx="6" fill="#222"/>
  <text x="350" y="55" text-anchor="middle" font-family="monospace" font-size="14" fill="#ffffff">白 SHIRO</text>
  <text x="450" y="55" text-anchor="middle" font-family="monospace" font-size="14" fill="#4a90d9">青 AO</text>
  <text x="350" y="78" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#00cc00">10</text>
  <text x="450" y="78" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#4a90d9">1</text>
  <!-- Medals -->
  <circle cx="180" cy="80" r="25" fill="#ffd700" opacity="0.8"/>
  <text x="180" y="87" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#8b6914">1</text>
  <circle cx="240" cy="80" r="22" fill="#c0c0c0" opacity="0.8"/>
  <text x="240" y="87" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#666">2</text>
  <circle cx="294" cy="80" r="20" fill="#cd7f32" opacity="0.8"/>
  <text x="294" y="87" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#6b3a00">3</text>
  <!-- Text -->
  <text x="400" y="145" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#e0e0e0">Wettkampf</text>
</svg>